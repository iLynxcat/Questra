name: Build

on:
    push:
        tags:
            - "*"

concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact: questra
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact: questra
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact: questra.exe
                    - os: ubuntu-22.04
                      target: x86_64-unknown-linux-gnu
                      artifact: questra

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - name: Install Linux dependencies
              if: matrix.os == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y cmake libx11-dev libxrandr-dev \
                    libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev \

            - name: Install Rust target
              run: rustup target add ${{ matrix.target }}

            - name: Build
              run: cargo build --release --target ${{ matrix.target }}

            - uses: actions/upload-artifact@v4
              with:
                  name: questra-${{ matrix.target }}
                  path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

    lipo:
        needs: build
        runs-on: macos-latest
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: questra-aarch64-apple-darwin
                  path: aarch64

            - uses: actions/download-artifact@v4
              with:
                  name: questra-x86_64-apple-darwin
                  path: x86_64

            - run: |
                  lipo -create -output questra \
                      aarch64/questra \
                      x86_64/questra

            - uses: actions/upload-artifact@v4
              with:
                  name: questra-macos-universal
                  path: questra
